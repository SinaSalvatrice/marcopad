name: Build marcopad Firmware

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AVR and ARM GCC Toolchains
        run: sudo apt-get update && sudo apt-get install -y gcc-avr avr-libc gcc-arm-none-eabi avrdude dfu-programmer dfu-util dos2unix

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK firmware
        run: |
          qmk setup -H ~/qmk_firmware -y

      - name: Verify toolchain and QMK installation
        run: |
          qmk --version
          qmk doctor; test $? -le 1

      - name: Copy keyboard into QMK tree
        run: |
          mkdir -p ~/qmk_firmware/keyboards/marcopad
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            "$GITHUB_WORKSPACE/keyboards/marcopad/" \
            ~/qmk_firmware/keyboards/marcopad/

      - name: Compile firmware
        run: |
          qmk compile -kb marcopad -km backlit

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: marcopad_firmware
          path: |
            $HOME/qmk_firmware/*.hex
            $HOME/qmk_firmware/.build/*.hex
            $HOME/qmk_firmware/*.bin
            $HOME/qmk_firmware/.build/*.bin
          if-no-files-found: error
