name: Build UF2 (rp2040zero_3x3_via)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "keyboards/sina/rp2040zero_3x3_via/**"
      - ".github/workflows/build_uf2.yml"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (your repo)
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git rsync \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            python3-pip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK firmware
        run: |
          qmk setup -H ~/qmk_firmware -y

      - name: Copy keyboard into QMK tree
        run: |
          mkdir -p ~/qmk_firmware/keyboards/sina/rp2040zero_3x3_via
          rsync -a --delete keyboards/sina/rp2040zero_3x3_via/ \
            ~/qmk_firmware/keyboards/sina/rp2040zero_3x3_via/

      - name: Compile UF2
        working-directory: ~/qmk_firmware
        run: |
          qmk compile -kb sina/rp2040zero_3x3_via -km via

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rp2040zero_3x3_via-uf2
          path: ~/qmk_firmware/.build/*.uf2
